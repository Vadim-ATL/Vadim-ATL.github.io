<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/png" href="assets/icon.svg">
    <link rel="stylesheet" href="assets/css/custom.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --text-nav: #4b5563;
            --border: #e5e7eb;
            --link: #2563eb;
            --link-hover: #1d4ed8;
            --panel: #f3f4f6;
            --tag-bg: #e5e7eb;
            --toggle-bg: #ffffff;
            --shadow: rgba(0, 0, 0, 0.04);
            --card-bg: #ffffff;
        }

        html[data-theme="dark"] {
            --bg: #0f1117;
            --text: #e8eaed;
            --text-muted: #9aa0a6;
            --text-nav: #bdc1c6;
            --border: #2a3340;
            --link: #8ab4f8;
            --link-hover: #aecbfa;
            --panel: #171c24;
            --tag-bg: #2a3340;
            --toggle-bg: #171c24;
            --shadow: rgba(0, 0, 0, 0.2);
            --card-bg: #16181d;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.65;
            color: var(--text);
            background: var(--bg);
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px 60px 24px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Navigation */
        nav {
            margin-bottom: 48px;
            padding: 20px 0 16px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 28px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--text-nav);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.01em;
            transition: color 0.2s ease;
            position: relative;
        }

        nav a:hover {
            color: var(--link);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--link);
            transition: width 0.25s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Typography */
        h1 { 
            font-size: 32px; 
            margin-bottom: 12px; 
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1.2;
        }

        h2 { 
            font-size: 20px; 
            margin: 48px 0 20px 0; 
            font-weight: 600; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 10px;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        h3 { 
            font-size: 17px; 
            margin: 24px 0 10px 0; 
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        p { 
            margin-bottom: 14px; 
            line-height: 1.7;
        }

        a { 
            color: var(--link); 
            text-decoration: none;
            transition: color 0.15s ease;
        }

        a:hover { 
            text-decoration: underline;
            color: var(--link-hover);
        }

        /* Contact */
        .contact { 
            margin: 20px 0; 
            font-size: 14px; 
        }

        .contact a { 
            margin-right: 20px; 
            font-weight: 500;
        }

        /* Paper cards */
        .paper { 
            margin-bottom: 28px; 
            padding: 20px 24px; 
            background: var(--card-bg); 
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 1px 3px var(--shadow);
            transition: box-shadow 0.2s ease, transform 0.15s ease;
        }

        .paper:hover {
            box-shadow: 0 4px 12px var(--shadow);
            transform: translateY(-1px);
        }

        .paper-title { 
            font-weight: 600; 
            font-size: 15px; 
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .paper-venue { 
            font-style: italic; 
            color: var(--text-muted); 
            font-size: 13px; 
            margin-bottom: 10px;
        }

        .paper-links a { 
            margin-right: 16px; 
            font-size: 13px;
            font-weight: 500;
        }

        /* Project cards */
        .project { 
            margin-bottom: 24px;
            padding: 20px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 1px 3px var(--shadow);
            transition: box-shadow 0.2s ease, transform 0.15s ease;
        }

        .project:hover {
            box-shadow: 0 4px 12px var(--shadow);
            transform: translateY(-1px);
        }

        .project-title { 
            font-weight: 600; 
            font-size: 15px;
        }

        .tag { 
            display: inline-block; 
            background: var(--tag-bg); 
            padding: 3px 10px; 
            border-radius: 4px; 
            font-size: 12px; 
            margin-right: 6px; 
            margin-top: 6px; 
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .bio { 
            font-size: 16px; 
            line-height: 1.7; 
            margin-bottom: 20px; 
            color: var(--text);
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            border: 1px solid var(--border);
            background: var(--toggle-bg);
            color: var(--text);
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--panel);
            border-color: var(--link);
        }

        /* Selection */
        ::selection {
            background: var(--link);
            color: white;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: 0 16px 40px 16px;
            }

            nav {
                gap: 16px;
                justify-content: center;
                flex-wrap: wrap;
            }

            nav a {
                font-size: 13px;
            }

            .paper, .project {
                padding: 16px 18px;
            }

            h1 {
                font-size: 26px;
            }

            h2 {
                font-size: 18px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle" type="button">Dark Mode</button>
    <nav>
        <a href="/">About</a>
        <a href="#research">Research</a>
        <a href="#publications">Publications</a>
        <a href="#projects">Projects</a>
        <a href="https://github.com/Vadim-ATL/Vadim-ATL/raw/main/CV.pdf" target="_blank">CV</a>
    </nav>

    {{ content }}
    <script>
    (function () {
      const saved = localStorage.getItem("theme");
      const initial = saved || "light";
      document.documentElement.setAttribute("data-theme", initial);

      const setButtonLabel = () => {
        const btn = document.getElementById("theme-toggle");
        if (!btn) return;
        btn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "Light Mode" : "Dark Mode";
      };

      window.addEventListener("DOMContentLoaded", function () {
        const btn = document.getElementById("theme-toggle");
        if (!btn) return;
        setButtonLabel();
        btn.addEventListener("click", function () {
          const current = document.documentElement.getAttribute("data-theme");
          const next = current === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("theme", next);
          setButtonLabel();
        });
      });
    })();
    </script>
</body>
</html>
